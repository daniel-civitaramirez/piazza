services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  evolution-postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_DB=evolution
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=${EVO_DB_PASSWORD}
    volumes:
      - evolution_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - AUTHENTICATION_API_KEY=${EVO_API_KEY}
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:${EVO_DB_PASSWORD}@evolution-postgres:5432/evolution?schema=public
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=false
      - DATABASE_SAVE_DATA_CONTACTS=false
      - DATABASE_SAVE_DATA_CHATS=false
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=evolution
      - WEBHOOK_GLOBAL_URL=http://app:8000/webhook
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=false
    volumes:
      - evolution_data:/evolution/instances
    depends_on:
      evolution-postgres:
        condition: service_healthy
    restart: unless-stopped

  app:
    build: .
    environment:
      - ADMIN_JID=${ADMIN_JID}
      - EVO_API_KEY=${EVO_API_KEY}
      - EVO_API_URL=http://evolution-api:8080
      - EVO_INSTANCE_NAME=${EVO_INSTANCE_NAME}
      - BOT_JID=${BOT_JID}
      - BOT_LID=${BOT_LID}
      - SUPABASE_DB_URL=${SUPABASE_DB_URL}
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENSOURCE_AGENT_ENABLED
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL
      - OLLAMA_TIMEOUT
      - CLAUDE_MODEL
      - CLAUDE_TIMEOUT
      - CLAUDE_MAX_TOKENS
      - LLM_TEMPERATURE
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - INJECTION_PATTERNS_PATH=/app/config/injection_patterns.json
      - OPENEXCHANGERATES_KEY=${OPENEXCHANGERATES_KEY}
      - SENTRY_DSN=${SENTRY_DSN}
      - SENTRY_TRACES_SAMPLE_RATE
      - DISCOVER_BOT_LID
      - CIRCUIT_BREAKER_FAILURES
      - CIRCUIT_BREAKER_WINDOW
      - CIRCUIT_BREAKER_COOLDOWN
      - GROUP_RATE_LIMIT_PER_MINUTE
      - MAX_MESSAGE_LENGTH
      - DEFAULT_CURRENCY
      - WA_SEND_MAX_RETRIES
      - WA_SEND_BACKOFF_BASE
      - WA_CLIENT_TIMEOUT
      - HEALTH_CHECK_TIMEOUT
      - CONVERSATION_CONTEXT_LIMIT
      - MESSAGE_LOG_RETENTION_MULTIPLIER
      - WORKER_MAX_JOBS
      - WORKER_JOB_TIMEOUT
      - GROUP_LOCK_TIMEOUT
      - GROUP_LOCK_WAIT
      - HUMAN_DELAY_MIN
      - HUMAN_DELAY_MAX
      - REMINDER_CRON_SECONDS
      - HF_HOME=/hf_cache
    volumes:
      - ./src:/app/src:ro
      - ./config/injection_patterns.json:/app/config/injection_patterns.json:ro
      - hf_cache:/hf_cache
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      - redis
      - ollama
      - evolution-api
    restart: unless-stopped

  worker:
    build: .
    command: ["arq", "piazza.workers.jobs.WorkerSettings"]
    environment:
      - ADMIN_JID=${ADMIN_JID}
      - EVO_API_KEY=${EVO_API_KEY}
      - EVO_API_URL=http://evolution-api:8080
      - EVO_INSTANCE_NAME=${EVO_INSTANCE_NAME}
      - BOT_JID=${BOT_JID}
      - BOT_LID=${BOT_LID}
      - SUPABASE_DB_URL=${SUPABASE_DB_URL}
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENSOURCE_AGENT_ENABLED
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL
      - OLLAMA_TIMEOUT
      - CLAUDE_MODEL
      - CLAUDE_TIMEOUT
      - CLAUDE_MAX_TOKENS
      - LLM_TEMPERATURE
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - INJECTION_PATTERNS_PATH=/app/config/injection_patterns.json
      - OPENEXCHANGERATES_KEY=${OPENEXCHANGERATES_KEY}
      - SENTRY_DSN=${SENTRY_DSN}
      - SENTRY_TRACES_SAMPLE_RATE
      - DISCOVER_BOT_LID
      - CIRCUIT_BREAKER_FAILURES
      - CIRCUIT_BREAKER_WINDOW
      - CIRCUIT_BREAKER_COOLDOWN
      - GROUP_RATE_LIMIT_PER_MINUTE
      - MAX_MESSAGE_LENGTH
      - DEFAULT_CURRENCY
      - WA_SEND_MAX_RETRIES
      - WA_SEND_BACKOFF_BASE
      - WA_CLIENT_TIMEOUT
      - HEALTH_CHECK_TIMEOUT
      - CONVERSATION_CONTEXT_LIMIT
      - MESSAGE_LOG_RETENTION_MULTIPLIER
      - WORKER_MAX_JOBS
      - WORKER_JOB_TIMEOUT
      - GROUP_LOCK_TIMEOUT
      - GROUP_LOCK_WAIT
      - HUMAN_DELAY_MIN
      - HUMAN_DELAY_MAX
      - REMINDER_CRON_SECONDS
      - HF_HOME=/hf_cache
    volumes:
      - ./src:/app/src:ro
      - ./config/injection_patterns.json:/app/config/injection_patterns.json:ro
      - hf_cache:/hf_cache
    depends_on:
      - redis
      - ollama
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  redis_data:
  ollama_data:
  evolution_pg_data:
  evolution_data:
  caddy_data:
  caddy_config:
  hf_cache:
